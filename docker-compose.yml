services:
  ollama:
    image: ollama/ollama:latest
    container_name: my-ia-ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    volumes:
      - ollama-data:/root/.ollama
    expose:
      - "11434"
    cpus: "2.0"
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: my-ia-api
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      MY_IA_API_KEY: ${MY_IA_API_KEY}
      MY_IA_MODEL: ${MY_IA_MODEL:-gemma3:1b}
      OLLAMA_BASE_URL: http://ollama:11434
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-1800}
      DEFAULT_NUM_CTX: ${DEFAULT_NUM_CTX:-2048}
      DEFAULT_TEMPERATURE: ${DEFAULT_TEMPERATURE:-0.3}
      DEFAULT_MAX_TOKENS: ${DEFAULT_MAX_TOKENS:-10000}
      DEFAULT_NUM_THREAD: ${DEFAULT_NUM_THREAD:-2}
      DEFAULT_SYSTEM_PROMPT: ${DEFAULT_SYSTEM_PROMPT:-Voce e um atendente de WhatsApp. Responda em portugues do Brasil, com tom profissional, cordial, objetivo e seguro. Use 1 ou 2 frases em respostas simples. Quando o usuario pedir dicas, passos ou lista, use no maximo 3 itens curtos e conclua a resposta. Nao use emojis, girias, brincadeiras ou linguagem excessivamente informal. Nao invente informacoes; se faltar contexto, peca a informacao necessaria. Nao use bom dia, boa tarde ou boa noite, a menos que o usuario ja tenha usado. Nao mostre raciocinio interno.}
    ports:
      - "${MY_IA_BIND:-127.0.0.1}:${MY_IA_PORT:-18080}:8080"
    cpus: "0.5"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  ollama-data:
